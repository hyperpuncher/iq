name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                    - os: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
                    - os: macos-latest
                      target: x86_64-apple-darwin
                    - os: macos-latest
                      target: aarch64-apple-darwin
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc

        steps:
            - uses: actions/checkout@v7
            - uses: dtolnay/rust-toolchain@v1
              with:
                  toolchain: stable
                  targets: ${{ matrix.target }}

            - name: Build
              shell: bash
              run: |
                  cargo build --release --target ${{ matrix.target }}
                  mkdir -p dist
                  BIN="iq"
                  EXT=""
                  if [[ "${{ matrix.target }}" == *windows* ]]; then
                    BIN="iq.exe"
                    EXT=".exe"
                  fi
                  cp "target/${{ matrix.target }}/release/$BIN" "dist/iq-${{ matrix.target }}$EXT"

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.target }}
                  path: dist/iq-${{ matrix.target }}*

    publish:
        name: Release and publish packages
        needs: [build]
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  path: dist

            - name: Rename binaries
              run: |
                  mv dist/x86_64-unknown-linux-gnu/iq-x86_64-unknown-linux-gnu dist/iq-linux-x64
                  mv dist/aarch64-unknown-linux-gnu/iq-aarch64-unknown-linux-gnu dist/iq-linux-arm64
                  mv dist/x86_64-apple-darwin/iq-x86_64-apple-darwin dist/iq-darwin-x64
                  mv dist/aarch64-apple-darwin/iq-aarch64-apple-darwin dist/iq-darwin-arm64
                  mv dist/x86_64-pc-windows-msvc/iq-x86_64-pc-windows-msvc.exe dist/iq-windows-x64.exe
                  rm -rf dist/x86_64-unknown-linux-gnu dist/aarch64-unknown-linux-gnu
                  rm -rf dist/x86_64-apple-darwin dist/aarch64-apple-darwin dist/x86_64-pc-windows-msvc

            - name: Release
              uses: softprops/action-gh-release@v3
              with:
                  files: dist/*
                  generate_release_notes: true

            - name: Compute checksums
              id: sha
              run: |
                  echo "linux-x64=$(sha256sum dist/iq-linux-x64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
                  echo "linux-arm64=$(sha256sum dist/iq-linux-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
                  echo "darwin-x64=$(sha256sum dist/iq-darwin-x64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
                  echo "darwin-arm64=$(sha256sum dist/iq-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

            - name: Generate Homebrew formula
              run: |
                  V="${GITHUB_REF_NAME#v}"
                  sed -e "s/{{VERSION}}/$V/g" \
                      -e "s/{{SHA_LINUX_X64}}/${{ steps.sha.outputs.linux-x64 }}/g" \
                      -e "s/{{SHA_LINUX_ARM64}}/${{ steps.sha.outputs.linux-arm64 }}/g" \
                      -e "s/{{SHA_DARWIN_X64}}/${{ steps.sha.outputs.darwin-x64 }}/g" \
                      -e "s/{{SHA_DARWIN_ARM64}}/${{ steps.sha.outputs.darwin-arm64 }}/g" \
                      packaging/homebrew/iq.rb.tmpl > /tmp/iq.rb

            - name: Push Homebrew formula
              env:
                  GH_PAT: ${{ secrets.GH_PAT }}
              run: |
                  git clone "https://x-access-token:${GH_PAT}@github.com/hyperpuncher/homebrew-tap.git" /tmp/homebrew-tap
                  mkdir -p /tmp/homebrew-tap/Formula
                  cp /tmp/iq.rb /tmp/homebrew-tap/Formula/iq.rb
                  cd /tmp/homebrew-tap
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  git add Formula/iq.rb
                  git diff --staged --quiet || git commit -m "iq ${GITHUB_REF_NAME}"
                  git push

            - name: Generate AUR PKGBUILD
              run: |
                  V="${GITHUB_REF_NAME#v}"
                  sed -e "s/{{VERSION}}/$V/g" \
                      -e "s/{{SHA_LINUX_X64}}/${{ steps.sha.outputs.linux-x64 }}/g" \
                      -e "s/{{SHA_LINUX_ARM64}}/${{ steps.sha.outputs.linux-arm64 }}/g" \
                      packaging/aur/PKGBUILD.tmpl > /tmp/PKGBUILD
                  sed -e "s/{{VERSION}}/$V/g" \
                      -e "s/{{SHA_LINUX_X64}}/${{ steps.sha.outputs.linux-x64 }}/g" \
                      -e "s/{{SHA_LINUX_ARM64}}/${{ steps.sha.outputs.linux-arm64 }}/g" \
                      packaging/aur/.SRCINFO.tmpl > /tmp/.SRCINFO

            - name: Push AUR
              env:
                  AUR_KEY: ${{ secrets.AUR_KEY }}
              run: |
                  mkdir -p ~/.ssh
                  echo "$AUR_KEY" > ~/.ssh/aur_key
                  chmod 600 ~/.ssh/aur_key
                  ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts
                  export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key"
                  git clone ssh://aur@aur.archlinux.org/iq-bin.git /tmp/aur-repo
                  cp /tmp/PKGBUILD /tmp/aur-repo/PKGBUILD
                  cp /tmp/.SRCINFO /tmp/aur-repo/.SRCINFO
                  cd /tmp/aur-repo
                  git config user.name "hyperpuncher"
                  git config user.email "hyperpuncher@users.noreply.github.com"
                  git add PKGBUILD .SRCINFO
                  git diff --staged --quiet || git commit -m "upgpkg: iq-bin ${GITHUB_REF_NAME#v}"
                  git push
